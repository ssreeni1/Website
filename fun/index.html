<style>
  /* Gallery wall — picture frames hung in salon arrangement */
  .fun-aside {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 56px;
    margin: 0 0 72px;
    padding: 24px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .fun-aside p {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0;
    text-wrap: pretty;
  }
  .fun-aside em { color: var(--ochre); font-style: italic; }

  .fun-wall {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-auto-rows: 78px;
    gap: 28px 32px;
    margin: 0 0 72px;
    padding: 24px 8px;
    background:
      radial-gradient(ellipse at top, color-mix(in oklch, var(--ochre) 4%, transparent) 0%, transparent 70%);
  }

  /* Frame — like a hung canvas with mat + bezel */
  .frame-piece {
    position: relative;
    align-self: start;
    background: var(--paper);
    padding: 16px 16px 18px;
    box-shadow:
      0 1px 0 oklch(0.96 0.008 78 / 0.6) inset,
      0 0 0 1px var(--rule),
      0 2px 4px rgba(0,0,0,0.06),
      0 14px 28px -10px rgba(0,0,0,0.18),
      0 24px 40px -20px rgba(0,0,0,0.14);
    transition: transform 0.7s cubic-bezier(.22,.61,.36,1), box-shadow 0.7s ease;
    transform: rotate(var(--r, 0deg));
    transform-origin: top center;
  }
  [data-theme="dark"] .frame-piece {
    background: var(--paper-2);
    box-shadow:
      0 1px 0 oklch(0.42 0.012 60 / 0.4) inset,
      0 0 0 1px var(--rule),
      0 14px 28px -10px rgba(0,0,0,0.45),
      0 24px 40px -20px rgba(0,0,0,0.35);
  }
  .frame-piece::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid color-mix(in oklch, var(--ochre) 32%, var(--rule));
    pointer-events: none;
    z-index: 1;
  }
  /* Nail — hanging detail */
  .frame-piece::after {
    content: "";
    position: absolute;
    top: -10px; left: 50%;
    width: 4px; height: 4px;
    margin-left: -2px;
    background: var(--ink-2);
    border-radius: 50%;
    box-shadow: 0 1px 1px rgba(0,0,0,0.2);
  }

  .frame-art {
    position: relative;
    aspect-ratio: 4 / 5;
    background: var(--paper-2);
    overflow: hidden;
    z-index: 0;
    border: 1px solid color-mix(in oklch, var(--ink-3) 22%, var(--rule));
  }
  .frame-art svg {
    width: 100%; height: 100%;
    display: block;
    filter: grayscale(1) contrast(1.04);
  }

  .frame-plaque { display: none !important; }
  .frame-piece:hover {
    transform: rotate(0deg) translateY(-3px);
    box-shadow:
      0 1px 0 oklch(0.96 0.008 78 / 0.6) inset,
      0 0 0 1px var(--ochre),
      0 4px 8px rgba(0,0,0,0.08),
      0 20px 40px -10px rgba(0,0,0,0.22),
      0 36px 56px -28px rgba(0,0,0,0.18);
  }

  /* Placement — salon hang */
  .p-backgammon { grid-column: 1  / span 4; grid-row: 1 / span 5; --r: -1.4deg; }
  .p-djing      { grid-column: 5  / span 4; grid-row: 1 / span 4; --r:  0.8deg; margin-top: 22px; }
  .p-f1         { grid-column: 9  / span 4; grid-row: 1 / span 5; --r: -0.6deg; margin-top: 8px; }
  .p-tennis     { grid-column: 2  / span 4; grid-row: 6 / span 4; --r:  1.2deg; }
  .p-horology   { grid-column: 6  / span 3; grid-row: 5 / span 4; --r: -0.9deg; }
  .p-ouroboros  { grid-column: 9  / span 4; grid-row: 6 / span 4; --r:  1.1deg; }

  /* Horizontal hanging rail */
  .rail {
    grid-column: 1 / -1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--rule) 8%, var(--rule) 92%, transparent);
    margin-bottom: -12px;
  }
  .rail.rail-2 { grid-row: 6; margin-top: -8px; }
  .rail.rail-1 { grid-row: 1; }

  @media (max-width: 820px) {
    .fun-wall { grid-template-columns: repeat(2, 1fr); grid-auto-rows: auto; gap: 32px; }
    .frame-piece { transform: none !important; }
    .p-backgammon, .p-djing, .p-f1, .p-tennis, .p-horology, .p-ouroboros {
      grid-column: span 1; grid-row: auto; margin-top: 0;
    }
    .rail { display: none; }
    .fun-aside { grid-template-columns: 1fr; gap: 12px; }
  }
</style>
</head>
<body>
<div class="sp-shell">

  <header class="sp-top">
    <a href="/" class="sp-back"><span class="sp-back-arrow">←</span> saneel.xyz</a>
    <span><span data-clock>—</span> · N 40°44′</span>
    <button class="sp-toggle" onclick="toggleTheme()" aria-label="Toggle theme">☾</button>
  </header>

  <p class="sp-eyebrow sp-reveal sp-reveal-1">iii. — fun</p>
  <h1 class="sp-title sp-reveal sp-reveal-2">Off the <em>clock</em></h1>
  <p class="sp-lede sp-reveal sp-reveal-3">
    A small gallery of things I keep coming back to when I&rsquo;m not at a screen —
    backgammon for the <em style="color:var(--ochre); font-style:italic;">variance</em>,
    DJing for the <em style="color:var(--ochre); font-style:italic;">room</em>,
    F1 and tennis for the <em style="color:var(--ochre); font-style:italic;">speed</em>,
    horology for the <em style="color:var(--ochre); font-style:italic;">patience</em>.
  </p>

  <section class="sp-section sp-reveal">
    <div class="fun-wall">
      <div class="rail rail-1"></div>

      <!-- 01 — Backgammon -->
      <figure class="frame-piece p-backgammon" data-old-site-key="backgammon">
        <div class="frame-art">

              </pattern>
            </defs>
            <rect width="100" height="125" fill="#efe8d8" />

            <rect x="8" y="22" width="84" height="80" fill="#e6dcc4" stroke="#2a261c" stroke-width="0.8" />
            <line x1="50" y1="22" x2="50" y2="102" stroke="#2a261c" stroke-width="0.6" />
            <!-- Points (triangles) -->
            <g fill="none" stroke="#2a261c" stroke-width="0.5">
              <polygon points="10,22 18,22 14,52" fill="url(#hatch1)" />
              <polygon points="22,22 30,22 26,52" />
              <polygon points="34,22 42,22 38,52" fill="url(#hatch1)" />
              <polygon points="54,22 62,22 58,52" />
              <polygon points="66,22 74,22 70,52" fill="url(#hatch1)" />
              <polygon points="78,22 86,22 82,52" />
              <polygon points="10,102 18,102 14,72" />
              <polygon points="22,102 30,102 26,72" fill="url(#hatch1)" />
              <polygon points="34,102 42,102 38,72" />
              <polygon points="54,102 62,102 58,72" fill="url(#hatch1)" />
              <polygon points="66,102 74,102 70,72" />
              <polygon points="78,102 86,102 82,72" fill="url(#hatch1)" />
            </g>
            <!-- Checkers -->
            <g stroke="#2a261c" stroke-width="0.5">
              <circle cx="14" cy="27" r="2.6" fill="#fff" />
              <circle cx="14" cy="32" r="2.6" fill="#fff" />
              <circle cx="70" cy="27" r="2.6" fill="#2a261c" />
              <circle cx="70" cy="32" r="2.6" fill="#2a261c" />
              <circle cx="82" cy="97" r="2.6" fill="#fff" />
              <circle cx="26" cy="97" r="2.6" fill="#2a261c" />
            </g>
            <!-- Dice -->
            <g stroke="#2a261c" stroke-width="0.6">
              <rect x="42" y="58" width="7" height="7" fill="#fff" />
              <rect x="52" y="58" width="7" height="7" fill="#fff" />
              <circle cx="45.5" cy="61.5" r="0.7" fill="#2a261c" />
              <circle cx="55.5" cy="60" r="0.6" fill="#2a261c" />

            </g>
          </svg>
        </div>
        <figcaption class="frame-plaque" hidden>

          <span class="pt">Backgammon</span>
          <span class="ps">Plate · Boards &amp; Dice</span>

      </figure>

      <!-- 02 — DJing / Turntable -->
      <figure class="frame-piece p-djing" data-old-site-key="djing">
        <div class="frame-art">

              <line x1="74" y1="88" x2="75.2" y2="86.5" />

        </div>
        <figcaption class="frame-plaque" hidden>
          <span class="pn">Nº 02</span>
          <span class="pt">The Turntable</span>
          <span class="ps">Studies in Rotation</span>
        </figcaption>
      </figure>

      <!-- 03 — F1 / Vintage Racecar -->
      <figure class="frame-piece p-f1" data-old-site-key="f1">
        <div class="frame-art">
          <svg viewBox="0 0 100 125" preserveAspectRatio="xMidYMid slice" aria-label="Racecar">

            <circle cx="28" cy="78" r="4" fill="#efe8d8" stroke="#2a261c" stroke-width="0.5" />
            <circle cx="74" cy="78" r="9" fill="#2a261c" />
            <circle cx="74" cy="78" r="4" fill="#efe8d8" stroke="#2a261c" stroke-width="0.5" />
            <!-- Exhaust -->

          </svg>
        </div>
        <figcaption class="frame-plaque" hidden>
          <span class="pn">Nº 03</span>
          <span class="pt">Grand Prix</span>
          <span class="ps">Monoposto · c. 1956</span>
        </figcaption>
      </figure>

      <div class="rail rail-2"></div>

      <!-- 04 — Tennis -->

        <div class="frame-art">

                <line x1="0" y1="0" x2="0" y2="3" stroke="#2a261c" stroke-width="0.5" />
              </pattern>

            <rect width="100" height="125" fill="#efe8d8" />

          <span class="pt">The Racquet</span>
          <span class="ps">Tennis &amp; Padel</span>
        </figcaption>

          <span class="pt">Pocket Watch</span>

      <!-- 06 — Ouroboros (closing the wall) -->

        <div class="frame-art">

            <rect width="100" height="125" fill="#efe8d8" />
